<ion-content [fullscreen]="true" class="splash-content">
  <div *ngIf="isDesktop" class="desktop-message-wrapper">
    <p class="desktop-message">Its working only mobile screen.</p>
  </div>

  <div *ngIf="!isDesktop" class="splash-wrapper">
 
    <!-- Logo — mirrors android:src="@drawable/ic_revoola_logo" -->
    <div class="logo-section">
      <img [src]="cacheBustAsset('assets/images/ic_revoola_logo.png')" alt="Revoola" class="logo-image" />
    </div>

    <!-- "The Best You" headline -->
    <p class="headline">The Best You</p>

    <!-- Bottom tagline — mirrors @string/justsettingthingsupforyou -->
    <div class="bottom-tagline">
      <p>Just setting things up for you…</p>
    </div>

  </div>
</ion-content>
